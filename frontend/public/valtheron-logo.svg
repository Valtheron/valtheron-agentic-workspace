<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <defs>
    <clipPath id="larm">
      <polygon points="18,6 48,6 68,108 41,108"/>
    </clipPath>
    <clipPath id="rarm">
      <polygon points="82,6 112,6 89,108 62,108"/>
    </clipPath>
    <clipPath id="shield-clip">
      <polygon points="65,2 118,4 132,64 65,118 -2,64 12,4"/>
    </clipPath>
  </defs>

  <!-- Shield background -->
  <polygon points="65,2 118,4 132,64 65,118 -2,64 12,4"
           fill="#0a0d14" stroke="#1a7dd4" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Left arm (white base) -->
  <polygon points="18,6 48,6 68,108 41,108" fill="white"/>
  <!-- Blue diagonal stripes over left arm -->
  <g clip-path="url(#larm)">
    <line x1="-5" y1="20"  x2="75"  y2="-5"  stroke="#1a7dd4" stroke-width="7"/>
    <line x1="-5" y1="42"  x2="75"  y2="17"  stroke="#1a7dd4" stroke-width="7"/>
    <line x1="-5" y1="64"  x2="75"  y2="39"  stroke="#1a7dd4" stroke-width="7"/>
    <line x1="-5" y1="86"  x2="75"  y2="61"  stroke="#1a7dd4" stroke-width="7"/>
    <line x1="-5" y1="108" x2="75"  y2="83"  stroke="#1a7dd4" stroke-width="7"/>
    <line x1="-5" y1="130" x2="75"  y2="105" stroke="#1a7dd4" stroke-width="7"/>
  </g>

  <!-- Right arm (white base) -->
  <polygon points="82,6 112,6 89,108 62,108" fill="white"/>
  <!-- Blue diagonal stripes over right arm -->
  <g clip-path="url(#rarm)">
    <line x1="55"  y1="-5"  x2="135" y2="20"  stroke="#1a7dd4" stroke-width="7"/>
    <line x1="55"  y1="17"  x2="135" y2="42"  stroke="#1a7dd4" stroke-width="7"/>
    <line x1="55"  y1="39"  x2="135" y2="64"  stroke="#1a7dd4" stroke-width="7"/>
    <line x1="55"  y1="61"  x2="135" y2="86"  stroke="#1a7dd4" stroke-width="7"/>
    <line x1="55"  y1="83"  x2="135" y2="108" stroke="#1a7dd4" stroke-width="7"/>
    <line x1="55"  y1="105" x2="135" y2="130" stroke="#1a7dd4" stroke-width="7"/>
  </g>

  <!-- Inner dark triangle to carve V shape -->
  <polygon points="48,6 82,6 65,108" fill="#0a0d14"/>

  <!-- Circuit network overlay (top of shield) -->
  <g clip-path="url(#shield-clip)">
    <!-- Lines -->
    <line x1="65" y1="2"  x2="35" y2="28" stroke="#1a7dd4" stroke-width="1.4"/>
    <line x1="65" y1="2"  x2="95" y2="28" stroke="white"   stroke-width="1.4"/>
    <line x1="35" y1="28" x2="50" y2="15" stroke="white"   stroke-width="1.4"/>
    <line x1="80" y1="15" x2="95" y2="28" stroke="#1a7dd4" stroke-width="1.4"/>
    <line x1="50" y1="15" x2="80" y2="15" stroke="white"   stroke-width="1.4"/>
    <line x1="50" y1="15" x2="35" y2="28" stroke="#1a7dd4" stroke-width="1.4"/>
    <line x1="65" y1="2"  x2="50" y2="15" stroke="#1a7dd4" stroke-width="1.4"/>
    <line x1="65" y1="2"  x2="80" y2="15" stroke="white"   stroke-width="1.4"/>
    <!-- Up-arrow on top -->
    <line x1="65" y1="2"  x2="72" y2="12" stroke="white"   stroke-width="1.8"/>
    <line x1="72" y1="12" x2="72" y2="30" stroke="white"   stroke-width="1.8"/>
    <!-- Nodes -->
    <circle cx="65" cy="2"  r="5"   fill="white"   stroke="#1a7dd4" stroke-width="1"/>
    <circle cx="35" cy="28" r="4"   fill="#1a7dd4"/>
    <circle cx="95" cy="28" r="4"   fill="#1a7dd4"/>
    <circle cx="50" cy="15" r="3.5" fill="white"/>
    <circle cx="80" cy="15" r="3.5" fill="#1a7dd4"/>
    <circle cx="72" cy="12" r="3"   fill="white"/>
    <circle cx="72" cy="30" r="3.5" fill="#1a7dd4" stroke="white" stroke-width="1"/>
  </g>

  <!-- VALTHERON text -->
  <text x="152" y="74"
        font-family="'Arial Black','Arial Bold',Impact,sans-serif"
        font-weight="900" font-size="58" letter-spacing="4">
    <tspan fill="white">VALT</tspan><tspan fill="#1a7dd4">HERON</tspan>
  </text>
  <!-- Underline -->
  <line x1="152" y1="88" x2="475" y2="88" stroke="#4a5568" stroke-width="1.5"/>
</svg>
